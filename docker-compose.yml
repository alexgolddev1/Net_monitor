services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -lc 'if [ ! -d vendor ]; then composer install --no-interaction --prefer-dist; fi; php-fpm'
    env_file: .env
    volumes:
      - ./:/var/www/html
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "8081:80"
    depends_on:
      database:
        condition: service_healthy


  netflow-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    user: www-data
    command: env APP_ENV=prod APP_DEBUG=0 php bin/console app:netflow:listen --host=0.0.0.0 --port=2055
    env_file: .env
    volumes:
      - ./:/var/www/html
    ports:
      - "2055:2055/udp"
    depends_on:
      database:
        condition: service_healthy
  database:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: monitoring
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  db_data:

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -lc 'if [ ! -d vendor ]; then composer install --no-interaction --prefer-dist; fi; php-fpm'
    env_file: .env
    volumes:
      - ./:/var/www/html
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: monitoring
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  ntopng:
    image: ntop/ntopng:latest
    command: ["--community", "-i", "tcp://*:5556", "-F", "mysql;database;ntopng;flows;root;root"]
    ports:
      - "3000:3000"
      - "2055:2055/udp"
    depends_on:
      - database

volumes:
  db_data:

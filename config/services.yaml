parameters:
  app.mock_network_data: '%env(bool:MOCK_NETWORK_DATA)%'
  app.favicon_provider: '%env(FAVICON_PROVIDER)%'
  app.local_subnets: '%env(LOCAL_SUBNETS)%'
  app.own_wan_ips: '%env(OWN_WAN_IPS)%'
  app.mikrotik_monitor_interface: 'ether1'
  app.maxmind_db_path: '%env(string:MAXMIND_DB_PATH)%'
  app.ip_api_enabled: '%env(bool:IP_API_ENABLED)%'
  app.abuseipdb_api_key: '%env(string:ABUSEIPDB_API_KEY)%'
  app.virustotal_api_key: '%env(string:VIRUSTOTAL_API_KEY)%'
  app.ip_intel_cache_days: '%env(int:IP_INTEL_CACHE_DAYS)%'

services:
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      bool $mockNetworkData: '%app.mock_network_data%'
      string $faviconProvider: '%app.favicon_provider%'
      string $localSubnets: '%app.local_subnets%'
      string $ownWanIps: '%app.own_wan_ips%'
      string $mikrotikMonitorInterface: '%app.mikrotik_monitor_interface%'
      string $maxmindDbPath: '%app.maxmind_db_path%'
      bool $ipApiEnabled: '%app.ip_api_enabled%'
      string $abuseIpDbApiKey: '%app.abuseipdb_api_key%'
      string $virusTotalApiKey: '%app.virustotal_api_key%'
      int $ipIntelCacheDays: '%app.ip_intel_cache_days%'

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'
